<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex and Grid Layout</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f9ff;
            min-height: 100vh;

            /* GRID LAYOUT */
            display: grid;
            grid-template-areas:
                "header header header"
                "nav nav nav"
                "left main right"
                "footer footer footer";

            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: auto auto 1fr auto;

            gap: 15px;
            padding: 15px;
        }

        /* Header */
        header {
            grid-area: header;
            background-color: #bae6fd;
            color: #075985;
            padding: 20px;
            border-radius: 12px;

            /* FLEX */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Navbar */
        nav {
            grid-area: nav;
            background-color: #dbeafe;
            padding: 15px;
            border-radius: 12px;
        }

        nav ul {
            list-style: none;

            /* FLEX */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #0369a1;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #0c4a6e;
        }

        /* Left Sidebar */
        .left-sidebar {
            grid-area: left;
            background-color: #bfdbfe;
            padding: 20px;
            border-radius: 12px;
        }

        /* Main Content */
        main {
            grid-area: main;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;

            /* FLEX */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Right Sidebar */
        .right-sidebar {
            grid-area: right;
            background-color: #bfdbfe;
            padding: 20px;
            border-radius: 12px;
        }

        /* Footer */
        footer {
            grid-area: footer;
            background-color: #bae6fd;
            color: #075985;
            padding: 15px;
            border-radius: 12px;

            /* FLEX */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1, h2, h3 {
            margin-bottom: 10px;
        }

        p {
            line-height: 1.6;
            color: #333;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                grid-template-areas:
                    "header"
                    "nav"
                    "left"
                    "main"
                    "right"
                    "footer";

                grid-template-columns: 1fr;
            }

            nav ul {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Hello World</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <aside class="left-sidebar">
        <h3>Left Sidebar</h3>
        <p>This is the left sidebar content.</p>
    </aside>

    <main>
        <h2>Welcome to my page</h2>
        <p>This is the example of Flex and Grid Layout.</p>
    </main>

    <aside class="right-sidebar">
        <h3>Right Sidebar</h3>
        <p>This is the right sidebar content.</p>
    </aside>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

</body>
</html>
