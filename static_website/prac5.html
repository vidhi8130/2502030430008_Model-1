<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Animation</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to top, #87ceeb 100%, #ffffff);
            height: 100vh;
        }

        h1 {
            text-align: center;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        /* ADD THIS CSS */

        .clouds {
        position: absolute;
        top: 80px;
        width: 100%;
        height: 200px;
        overflow: hidden;
      }

/* Cloud Design */
.cloud {
    position: absolute;
    width: 120px;
    height: 60px;
    background: white;
    border-radius: 50px;
    opacity: 0.9;
}

/* Cloud circles */
.cloud::before,
.cloud::after {
    content: "";
    position: absolute;
    background: white;
    border-radius: 50%;
}

.cloud::before {
    width: 60px;
    height: 60px;
    top: -30px;
    left: 15px;
}

.cloud::after {
    width: 80px;
    height: 80px;
    top: -40px;
    right: 15px;
}

/* Individual Clouds */
.cloud1 {
    top: 40px;
    left: -200px;
    animation: cloudMove 30s linear infinite;
}

.cloud2 {
    top: 80px;
    left: -300px;
    transform: scale(0.8);
    animation: cloudMove 40s linear infinite;
}

.cloud3 {
    top: 55px;
    left: -400px;
    transform: scale(1.2);
    animation: cloudMove 50s linear infinite;
}

/* Cloud Animation */
@keyframes cloudMove {
    from {
        left: -300px;
    }

    to {
        left: 110%;
    }
}

         /* Mountains */
        .mountains {
            position: absolute;
            bottom: 180px;
            width: 100%;
            height: 300px;
            overflow: hidden;
        }

        .mountain {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-bottom: 300px solid #16cc49;
        }

        .mountain1 {
            left: 1%;
            color: #16cc49;
        }

        .mountain2 {
            left: 25%;
            color: #16cc49;
        }

        .mountain3 {
            left: 50%;
            color: #16cc49;
        }

        .mountain4 {
            left: 75%;
            color: #16cc49;
        }

        /* Snow caps */
        .mountain::after {
            content: "";
            position: absolute;
            top: 0;
            left: -60px;
            width: 0;
            height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 100px solid white;
        }

       


        /* Road
        .road {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px;
            background: #333;
            overflow: hidden;
        }

        /* Road lines */
        /* .road::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 10px;
            background: repeating-linear-gradient(
                to right,
                white 0 50px,
                transparent 50px 100px
            );
            top: 50%;
            transform: translateY(-50%);
            animation: roadMove 3s linear infinite;
        }  

        @keyframes roadMove {
            from {
                transform: translateX(0) translateY(-50%);
            }
            to {
                transform: translateX(-100px) translateY(-50%);
            }
        }

        /* Car animation */
        .car {
            position: absolute;
            bottom: 80px;
            left: -300px;
            animation: moveCar 8s linear infinite;
        }

        @keyframes moveCar {
            0% {
                left: -300px;
            }

            100% {
                left: 110%;
            }
        }

        /* Wheel rotation */
        .wheel {
            animation: spin 1s linear infinite;
            transform-origin: center;
        }

       
    </style>
</head>

<body>

    
    <div class="clouds">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    </div>


    <!-- Mountains -->
    <div class="mountains">
        <div class="mountain mountain1"></div>
        <div class="mountain mountain2"></div>
        <div class="mountain mountain3"></div>
        <div class="mountain mountain4"></div>
    </div>

                    fill="#aa2c61" />

            </g>
        </svg>

    </div>

    <!-- Road -->
    <div class="road"></div>

</body>
</html>
