<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="prac3.css">
</head>
<body>
    <marquee>Welcome to our Registration Form</marquee>
    <h1>Registration Form</h1><image src="C:\Users\hkp19\Downloads\ChatGPT Image Apr 2, 2025, 11_41_14 AM.png" alt="Profile photo" height="100" width="100"></image>
    <form action="" method="post">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <hyperlink href="https://www.linkedin.com/" target="_blank">Visit Linkedin</hyperlink><br><br>

        <label for="contactno">Contact Number:</label><br>
        <input type="tel" id="contactno" name="contactno" required><br><br>

        
        <label for="address">Address:</label><br>
        <textarea id="address" name="address" required></textarea><br><br>
        

        <label for="state">State</label>
        <select id="state" name="state" required>
            <option value="">Select a state</option>
            <option value="Guj">Gujarat</option>
            <option value="Mah">Maharashtra</option>
            <option value="Delhi">Delhi</option>
            <option value="Raj">Rajasthan</option>
            <option value="UP">Uttar Pradesh</option>
        </select><br><br>

        <label for="gender">Gender:</label><br>
        <input type="radio" id="male" name="gender" value="male" required> 
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female">Female</label><br>
        <input type="radio" id="other" name="gender" value="other" required>
        <label for="other">Other</label><br><br>

        <label for="hobbies">Hobbies:</label><br>
        <input type="checkbox" id="hobby1" name="hobbies" value="reading">
        <label for="hobby1">Reading</label><br>
        <input type="checkbox" id="hobby2" name="hobbies" value="traveling">
        <label for="hobby2">Traveling</label><br>
        <input type="checkbox" id="hobby3" name="hobbies" value="sports">
        <label for="hobby3">Sports</label><br>
        <input type="checkbox" id="hobby4" name="hobbies" value="music">
        <label for="hobby4">Music</label><br>
        <input type="checkbox" id="hobby5" name="hobbies" value="drawing">
        <label for="hobby5">Drawing</label><br><br>

        <button type="submit">Submit</button>
    </form>
