<!DOCTYPE html>
<html>

<head>
    <title>Nested List in HTML</title>
</head>

<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">

    <h2 style="color: #4a148c; text-align: center;">
        Nested List
    </h2>

    <ul style="background-color: #ffffff; width: 300px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0px 2px 8px rgba(0,0,0,0.2);">

        <li style="color: #00695c; font-size: 18px; font-weight: bold; margin-bottom: 10px;">
            Engineering

            <ul style="margin-top: 8px; color: #555;">
                <li style="margin: 5px 0;">Diploma</li>
                <li style="margin: 5px 0;">B.Tech</li>
            </ul>
        </li>

        <li style="color: #00695c; font-size: 18px; font-weight: bold; margin-bottom: 10px;">
            Diploma

            <ol style="margin-top: 8px; color: #555;">
                <li style="margin: 5px 0;">CE</li>
                <li style="margin: 5px 0;">CSE</li>
                <li style="margin: 5px 0;">IT</li>
            </ol>
        </li>

        <li style="color: #00695c; font-size: 18px; font-weight: bold;">
            B.Tech

            <ol style="margin-top: 8px; color: #555;">
                <li style="margin: 5px 0;">CE</li>
                <li style="margin: 5px 0;">CSE</li>
                <li style="margin: 5px 0;">IT</li>
            </ol>
        </li>

    </ul>

</body>

</html>
